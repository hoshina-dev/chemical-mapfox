# Self-contained acceptance-test stack.
#
#   docker compose -f docker-compose.e2e.yml run --build --rm e2e
#
# Builds the monorepo into a Playwright image and runs the full CucumberJS suite
# (every feature + auto-loaded stub module). Collaborative editing uses an
# in-memory Redis mock inside the web app; everything else is stubbed in-process.
services:
  e2e:
    build:
      context: .
      dockerfile: e2e/Dockerfile
    environment:
      HEADLESS: "true"
      E2E_REDIS_MOCK: "1"
      REDIS_URL: redis://mock
