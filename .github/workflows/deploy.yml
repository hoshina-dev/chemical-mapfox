name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  DOCKERFILE_PATH: apps/web/Dockerfile
  GHCR_REGISTRY: ghcr.io
  GHCR_IMAGE_NAME: chemical-mapfox-web

jobs:
  prepare-image:
    name: Prepare image variables
    runs-on: ubuntu-latest
    outputs:
      semver: ${{ steps.set.outputs.semver }}
      ghcr_image_full: ${{ steps.set.outputs.ghcr_image_full }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Determine version and image tags
        id: set
        run: |
          set -eux

          SEMVER="latest"
          OWNER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          IMAGE_NAME="$(echo "${{ env.GHCR_IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')"
          GHCR_IMAGE_FULL="${{ env.GHCR_REGISTRY }}/${OWNER}/${IMAGE_NAME}"

          echo "semver=$SEMVER" >> "$GITHUB_OUTPUT"
          echo "ghcr_image_full=$GHCR_IMAGE_FULL" >> "$GITHUB_OUTPUT"

  build-amd64:
    name: Build web image (amd64)
    needs: prepare-image
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push amd64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.DOCKERFILE_PATH }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ needs.prepare-image.outputs.ghcr_image_full }}-build:latest-amd64

  build-arm64:
    name: Build web image (arm64)
    needs: prepare-image
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push arm64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.DOCKERFILE_PATH }}
          platforms: linux/arm64
          push: true
          tags: |
            ${{ needs.prepare-image.outputs.ghcr_image_full }}-build:latest-arm64

  push-web-image:
    name: Create web image manifest
    needs:
      - prepare-image
      - build-amd64
      - build-arm64
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          set -eux
          GHCR_IMAGE="${{ needs.prepare-image.outputs.ghcr_image_full }}"
          BUILD_IMAGE="${{ needs.prepare-image.outputs.ghcr_image_full }}-build"
          COMMIT_SHA="${{ github.sha }}"
          SHORT_SHA="${COMMIT_SHA:0:7}"

          docker buildx imagetools create \
            --tag "${GHCR_IMAGE}:${{ needs.prepare-image.outputs.semver }}" \
            --tag "${GHCR_IMAGE}:${SHORT_SHA}" \
            "${BUILD_IMAGE}:latest-amd64" \
            "${BUILD_IMAGE}:latest-arm64"

  cleanup-web-build-images:
    name: Cleanup temporary web build images
    needs:
      - prepare-image
      - push-web-image
    runs-on: ubuntu-24.04
    if: always()
    steps:
      - name: Delete temporary build package
        run: |
          set -eux

          OWNER="${{ github.repository_owner }}"
          PACKAGE_NAME="${{ env.GHCR_IMAGE_NAME }}-build"

          OWNER_TYPE="$(
            curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/users/${OWNER}" \
              | sed -n 's/.*"type": *"\([^"]*\)".*/\1/p' \
              | head -n 1
          )"

          if [ "$OWNER_TYPE" = "Organization" ]; then
            PACKAGE_URL="https://api.github.com/orgs/${OWNER}/packages/container/${PACKAGE_NAME}"
          else
            PACKAGE_URL="https://api.github.com/user/packages/container/${PACKAGE_NAME}"
          fi

          echo "Attempting to delete package: ${PACKAGE_NAME}"

          curl -X DELETE \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$PACKAGE_URL" \
            || echo "Package ${PACKAGE_NAME} may not exist or already be deleted"

          echo "Cleanup completed"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
